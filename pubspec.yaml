name: vidlang
description: "VidLang - 通过视频学习语言的移动应用，专注于英语学习"
# 防止意外发布到 pub.dev
publish_to: "none"

# 应用版本信息
version: 1.0.0+1

environment:
  sdk: ^3.13.0-103.1.beta

dependencies:
  flutter:
    sdk: flutter

  # 状态管理 - 现代化、可测试的状态管理方案
  # 核心依赖，用于管理应用状态
  flutter_riverpod: ^2.6.1

  # TDesign Flutter - UI 组件库（统一弹窗/Toast/图标等）
  tdesign_flutter:
    path: plugs/tdesign_flutter

  # UUID 生成器 - 用于生成唯一的业务标识符
  # 用于生成 code 等唯一字段
  uuid: ^4.4.0

  # VS Code 结构化日志 - 用于统一记录关键流程与异常堆栈
  flutter_vscode_logger: ^1.0.3

  # SQLite 数据库 - Flutter 本地数据库
  # 用于存储视频、文件夹、学习记录等数据
  sqflite: ^2.3.3

  # 路径工具库 - 获取应用文档目录、缓存目录等
  # 用于存储视频文件、封面图片等
  path_provider: ^2.1.3

  # 路径操作库 - 路径拼接、解析等
  path: ^1.9.1

  # 视频缩略图生成 - 从视频中提取帧作为封面/进度截图
  video_thumbnail: ^0.5.6

  # 文件选择器 - 选择本地视频文件
  # 用于导入本地视频或字幕文件
  file_picker: ^11.0.2

  # 屏幕适配 - 实现自适应布局
  # 支持iphone和ipad等多种设备，自动适配屏幕尺寸
  flutter_screenutil: ^5.9.3

  # 视频播放器 - 用于获取视频时长等信息
  video_player: ^2.8.6

  # 原生播放器内核（用于横屏播放器）
  omni_player:
    path: plugs/omni_player

  # 动画组件 - 提供平滑的动画效果
  lottie: ^2.7.0

  # Supabase - 后端服务（认证、数据库等）
  supabase_flutter: ^2.8.4

  flutter_secure_storage: ^9.2.4
  cryptography: ^2.7.0

  # WebSocket - 用于声通语音评测
  web_socket_channel: ^3.0.1

  # 加密工具 - 用于声通签名生成
  crypto: ^3.0.6

  # 音频播放 - 用于播放 TTS 和录音文件
  audioplayers: ^6.1.0

  # 录音 - 用于录制用户语音
  record: ^6.0.0

  # 系统 TTS - 调用原生 TTS 引擎朗读字幕/单词
  flutter_tts: ^4.1.0
dev_dependencies:
  flutter_test:
    sdk: flutter

  integration_test:
    sdk: flutter

  # Flutter 代码规范检查
  # 提供代码风格建议和最佳实践
  flutter_lints: ^6.0.0

dependency_overrides:
  tdesign_flutter_adaptation:
    path: plugs/tdesign_flutter_adaptation
  video_thumbnail:
    path: plugs/video_thumbnail

flutter:
  uses-material-design: true
  assets:
    - assets/app/
    - assets/video_plays/
    - assets/dictionary/
